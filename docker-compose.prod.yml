services:
  postgres:
    image: postgres:16-alpine
    container_name: vrc-quality-connect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vrc_quality_connect_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - vrc_internal

  backend:
    image: ghcr.io/jeqasm/vrc-quality-connect-backend:${APP_IMAGE_TAG:-latest}
    container_name: vrc-quality-connect-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    command: ["sh", "-c", "npm run prisma:migrate:deploy && npm run start"]
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - vrc_internal

  frontend:
    image: ghcr.io/jeqasm/vrc-quality-connect-frontend:${APP_IMAGE_TAG:-latest}
    container_name: vrc-quality-connect-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - vrc_internal

networks:
  vrc_internal:
    driver: bridge

volumes:
  vrc_quality_connect_postgres_data:
